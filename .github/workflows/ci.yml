name: CI
# D-PH6-16: Core PR/main quality gate for lint/type/unit before deployment workflows.

on:
  # D-PH6-16 trigger strategy: validate every PR and protected-branch push.
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    # D-PH6-16 release gate: static quality checks must pass before tests/deploy.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm turbo run lint
      - name: Scan for unapproved stub patterns
        # PH7.13 T03 — CI-level grep gate for throw-not-implemented patterns.
        # Layer 2 enforcement: complements ESLint (Layer 1) by catching patterns
        # in .js files, generated code, or files outside the ESLint config scope.
        #
        # Exclusions (D-06 and test file conventions):
        #   tools/mocks/   — SPFx SDK mocks (globally exempt per ADR-0095 D-06)
        #   dist/          — generated output
        #   node_modules/  — dependencies
        #   coverage/      — test output
        #   .git/          — version control metadata
        #   *.test.*       — test files may legitimately mock stubs
        #   *.spec.*       — spec files may legitimately mock stubs
        #   stub-approved: — intentional stubs marked with escape hatch
        run: |
          FOUND=$(grep -rn \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=dist \
            --exclude-dir=node_modules \
            --exclude-dir=coverage \
            --exclude-dir=".git" \
            -E "(throw new Error\(['\"\`][^'\"]*not.?impl|throw new Error\(['\"\`][^'\"]*placeholder)" \
            packages/ apps/ backend/ 2>/dev/null \
            | grep -v "stub-approved:" \
            | grep -v "\.test\.\|\.spec\.\|tools/mocks" \
            || true)

          if [ -n "$FOUND" ]; then
            echo "::error::Unapproved stub patterns detected. Implement the function or add '// stub-approved: <reason>' above the throw."
            echo ""
            echo "$FOUND"
            exit 1
          fi

          echo "Stub scan: no unapproved stub patterns found."
      - name: Type check
        run: pnpm turbo run check-types

  unit-tests:
    # D-PH6-16 release gate: provisioning unit suite runs with Azurite-backed storage path.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Start Azurite (Azure Storage emulator)
        run: |
          npm install -g azurite
          azurite --silent --location /tmp/azurite &
          sleep 2

      - name: Run unit tests with coverage
        # D-PH6-16: Layer 1 gate for provisioning-safe releases.
        run: pnpm turbo run test --filter=@hbc/functions --filter=@hbc/provisioning
        env:
          AZURE_STORAGE_CONNECTION_STRING: UseDevelopmentStorage=true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            backend/functions/coverage/
            packages/provisioning/coverage/
          retention-days: 14

  unit-tests-p1:
    # PH7.8: P1 platform package test gate — no Azurite needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Run P1 unit tests with coverage
        run: >-
          pnpm turbo run test
          --filter=@hbc/auth
          --filter=@hbc/shell
          --filter=@hbc/sharepoint-docs
          --filter=@hbc/bic-next-move
          --filter=@hbc/complexity
          --filter=@hbc/acknowledgment
          --filter=@hbc/step-wizard
          --filter=@hbc/versioned-record
          --filter=@hbc/field-annotations
          --filter=@hbc/workflow-handoff
          --filter=@hbc/session-state
          --filter=@hbc/project-canvas
          --filter=@hbc/post-bid-autopsy
          --filter=@hbc/strategic-intelligence
          --filter=@hbc/my-work-feed
          --filter=@hbc/ai-assist
          --filter=@hbc/notification-intelligence
          --filter=@hbc/related-items
          --filter=@hbc/score-benchmark
          --filter=@hbc/smart-empty-state
          --filter=@hbc/data-seeding
          --filter=@hbc/query-hooks
          --filter=@hbc/health-indicator

      - name: Upload P1 coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-p1
          path: |
            packages/auth/coverage/
            packages/shell/coverage/
            packages/sharepoint-docs/coverage/
            packages/bic-next-move/coverage/
            packages/complexity/coverage/
            packages/acknowledgment/coverage/
            packages/step-wizard/coverage/
            packages/versioned-record/coverage/
            packages/field-annotations/coverage/
            packages/workflow-handoff/coverage/
            packages/session-state/coverage/
            packages/project-canvas/coverage/
            packages/post-bid-autopsy/coverage/
            packages/strategic-intelligence/coverage/
            packages/my-work-feed/coverage/
            packages/ai-assist/coverage/
            packages/notification-intelligence/coverage/
            packages/related-items/coverage/
            packages/score-benchmark/coverage/
            packages/smart-empty-state/coverage/
            packages/data-seeding/coverage/
            packages/query-hooks/coverage/
            packages/health-indicator/coverage/
          retention-days: 14

  unit-tests-apps:
    # Wave 1: App-level test gate for admin, estimating, accounting, PWA + role-branch enforcement.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Admin app tests
        run: pnpm --filter @hbc/spfx-admin test

      - name: Estimating app tests
        run: pnpm --filter @hbc/spfx-estimating test

      - name: Accounting app tests
        run: pnpm --filter @hbc/spfx-accounting test

      - name: PWA tests
        run: pnpm --filter @hbc/pwa test

      - name: Project Hub app tests
        run: pnpm --filter @hbc/spfx-project-hub test

      - name: Business Development app tests
        run: pnpm --filter @hbc/spfx-business-development test

      - name: Leadership app tests
        run: pnpm --filter @hbc/spfx-leadership test

      - name: Safety app tests
        run: pnpm --filter @hbc/spfx-safety test

      - name: Quality Control & Warranty app tests
        run: pnpm --filter @hbc/spfx-quality-control-warranty test

      - name: Risk Management app tests
        run: pnpm --filter @hbc/spfx-risk-management test

      - name: Operational Excellence app tests
        run: pnpm --filter @hbc/spfx-operational-excellence test

      - name: Human Resources app tests
        run: pnpm --filter @hbc/spfx-human-resources test

      - name: Role-branch gate
        # G4-T06-002: Verify no hardcoded role === checks in app source.
        run: bash tools/check-no-role-branch.sh
