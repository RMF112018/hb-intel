name: Deploy Azure Functions
# D-PH6-16: Environment-aware Functions deployment pipeline — invoked explicitly via
# workflow_dispatch or as a reusable workflow_call; not auto-triggered on push.
# main_hb-intel-function-app.yml is the governed automatic production deploy path.

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  id-token: write  # Required for OIDC login
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Keep this turbo scope identical to scripts/package-functions-artifact.ts and
      # main_hb-intel-function-app.yml so clean CI can resolve shared package dist
      # outputs (e.g. @hbc/sharepoint-platform type declarations) before @hbc/functions.
      - name: Build upstream packages for @hbc/functions
        run: |
          pnpm turbo run build \
            --filter=@hbc/models \
            --filter=@hbc/sharepoint-platform \
            --filter=@hbc/provisioning \
            --filter=@hbc/notification-intelligence \
            --filter=@hbc/acknowledgment \
            --filter=@hbc/functions

      - name: Run unit tests (gate)
        run: pnpm turbo run test --filter=@hbc/functions --filter=@hbc/provisioning
        env:
          AZURITE_TEST: 'true'
          AZURE_TABLE_ENDPOINT: UseDevelopmentStorage=true

      - name: Package Functions artifact
        run: |
          pnpm exec tsx scripts/package-functions-artifact.ts \
            --output "$GITHUB_WORKSPACE/functions-artifact.zip" \
            --staging "$RUNNER_TEMP/functions-deploy"

      - uses: actions/upload-artifact@v4
        with:
          name: functions-artifact
          path: functions-artifact.zip
          retention-days: 7

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    env:
      AZURE_CLIENT_ID_RESOLVED: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID_RESOLVED: ${{ secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID_RESOLVED: ${{ secrets.AZURE_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID }}
      TARGET_FUNCTION_APP_NAME_RESOLVED: ${{ secrets.AZURE_FUNCTIONAPP_NAME_STAGING || vars.AZURE_FUNCTIONAPP_NAME_STAGING }}
    # D-PH6-16 environment strategy: staging deploys only on explicit workflow_dispatch or
    # reusable workflow_call with environment=staging (no automatic push trigger).
    if: (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging') || (github.event_name == 'workflow_call' && inputs.environment == 'staging')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: functions-artifact

      - name: Verify Azure deployment secret contract
        env:
          AZURE_CLIENT_ID: ${{ env.AZURE_CLIENT_ID_RESOLVED }}
          AZURE_TENANT_ID: ${{ env.AZURE_TENANT_ID_RESOLVED }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID_RESOLVED }}
          TARGET_FUNCTION_APP_NAME: ${{ env.TARGET_FUNCTION_APP_NAME_RESOLVED }}
        run: |
          set -euo pipefail
          missing=0
          for key in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID TARGET_FUNCTION_APP_NAME; do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key is missing for this deploy-functions workflow invocation (staging job)."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Configure the AZURE_* / AZURE_FUNCTIONAPP_NAME_STAGING secrets or variables contract before invoking this workflow."
            exit 1
          fi

      - name: Azure Login
        # D-PH6-16 secrets: tenant/client/subscription are sourced from GitHub encrypted secrets.
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID_RESOLVED }}
          tenant-id: ${{ env.AZURE_TENANT_ID_RESOLVED }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID_RESOLVED }}

      # Target hosting model: Azure Functions Flex Consumption (see infra/legacy-fallback-hosting.bicep).
      # azure/functions-action@v1 performs OneDeploy against the Flex app; do not substitute config-zip.
      # Post-deploy closure: see docs/how-to/administrator/legacy-fallback-closure-report-template.md
      # for the A-E validation sequence; use scripts/collect-legacy-fallback-closure-evidence.sh to
      # capture B/D/E proof into a deterministic JSON.
      - name: Deploy to Staging Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.TARGET_FUNCTION_APP_NAME_RESOLVED }}
          package: functions-artifact.zip
          respect-funcignore: true

  deploy-production:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    env:
      AZURE_CLIENT_ID_RESOLVED: ${{ secrets.AZURE_CLIENT_ID || vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID_RESOLVED: ${{ secrets.AZURE_TENANT_ID || vars.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID_RESOLVED: ${{ secrets.AZURE_SUBSCRIPTION_ID || vars.AZURE_SUBSCRIPTION_ID }}
      TARGET_FUNCTION_APP_NAME_RESOLVED: ${{ secrets.AZURE_FUNCTIONAPP_NAME_PROD || vars.AZURE_FUNCTIONAPP_NAME_PROD }}
    # D-PH6-16 release gate: production deploy allowed only for semantic version tags or explicit production dispatch.
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production') || (github.event_name == 'workflow_call' && inputs.environment == 'production')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: functions-artifact

      - name: Verify Azure deployment secret contract
        env:
          AZURE_CLIENT_ID: ${{ env.AZURE_CLIENT_ID_RESOLVED }}
          AZURE_TENANT_ID: ${{ env.AZURE_TENANT_ID_RESOLVED }}
          AZURE_SUBSCRIPTION_ID: ${{ env.AZURE_SUBSCRIPTION_ID_RESOLVED }}
          TARGET_FUNCTION_APP_NAME: ${{ env.TARGET_FUNCTION_APP_NAME_RESOLVED }}
        run: |
          set -euo pipefail
          missing=0
          for key in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID TARGET_FUNCTION_APP_NAME; do
            if [ -z "${!key:-}" ]; then
              echo "::error::$key is missing for this deploy-functions workflow invocation (production job)."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Configure the AZURE_* / AZURE_FUNCTIONAPP_NAME_PROD secrets or variables contract before invoking this workflow."
            exit 1
          fi

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID_RESOLVED }}
          tenant-id: ${{ env.AZURE_TENANT_ID_RESOLVED }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID_RESOLVED }}

      # Target hosting model: Azure Functions Flex Consumption (see infra/legacy-fallback-hosting.bicep).
      # azure/functions-action@v1 performs OneDeploy against the Flex app; do not substitute config-zip.
      # Post-deploy closure: see docs/how-to/administrator/legacy-fallback-closure-report-template.md
      # for the A-E validation sequence; use scripts/collect-legacy-fallback-closure-evidence.sh to
      # capture B/D/E proof into a deterministic JSON.
      - name: Deploy to Production Function App
        uses: azure/functions-action@v1
        with:
          app-name: ${{ env.TARGET_FUNCTION_APP_NAME_RESOLVED }}
          package: functions-artifact.zip
          respect-funcignore: true
