name: Setup pnpm
description: Install pnpm, Node.js 20, and project dependencies with caching

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
